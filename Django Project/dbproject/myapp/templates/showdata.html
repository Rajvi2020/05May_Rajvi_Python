<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body style="background-color: aliceblue">
    <h1 style="text-align: center; color: blue">Showdata</h1>
    <hr />
    <!-- {{data}} -->
    <!-- {% for i in data %}
     {{i.id}}
     {{i.name}}
     {{i.name}}

     {{i.dob}}
     {% endfor %} -->

    <table border="2" align="center">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Mobile</th>
        <th>DOB</th>
        <th>Action</th>
      </tr>
      {% for i in data %}

      <tr>
        <td>{{i.id}}</td>
        <td>{{i.name}}</td>
        <td>{{i.email}}</td>
        <td>{{i.dob}}</td>
        <td>
          <a href="/updatedata/{{i.id}}">Update</a>
          <a href="/deletedata/{{i.id}}">Delete</a>
        </td>
      </tr>
      {% endfor %}
    </table>
  </body>
</html>
