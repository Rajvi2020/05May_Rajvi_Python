<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>form</title>
</head>
<body style="background-color: aliceblue;">
  <h1 style="text-align: center;color: blue;">welcome to database app</h1>
  <form method="post">
    {% csrf_token %}
    <input type="text" name="name" value="{{stid.name}}" placeholder="name"><br>
    <br>
     <input type="email" name="email"  value="{{stid.email}}" placeholder="email"><br>
    <br>
     <input type="number"   name="mobile" value="{{stid.mobile}}" placeholder="mobile"><br>
    <br>
     <input type="date"   value="{{stid.dob | date:'Y-m-d'}}" name="dob" ><br>
      <input type="submit" value="update"><br>
    <br>
    <br>

  </form>
  <a href="/showdata">Showdata</a>
</body>
</html>
