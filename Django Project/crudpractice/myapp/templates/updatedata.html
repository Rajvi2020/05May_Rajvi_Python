<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update User</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

<div class="card shadow mx-auto" style="max-width:600px;">

<div class="card-header bg-dark text-white text-center">
<h3>Update User</h3>
</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label>Name</label>
<input type="text" name="name" class="form-control" value="{{ stid.name }}">
</div>

<div class="mb-3">
<label>Age</label>
<input type="number" name="age" class="form-control" value="{{ stid.age }}">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control" value="{{ stid.email }}">
</div>

<div class="mb-3">
<label>Mobile</label>
<input type="text" name="mobile" class="form-control" value="{{ stid.mobile }}">
</div>

<div class="mb-3">
<label>Address</label>
<textarea name="address" class="form-control" rows="3">{{ stid.address }}</textarea>
</div>

<button type="submit" class="btn btn-dark w-100">
Update
</button>

</form>

</div>

</div>

</div>

</body>
</html>
