<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">


<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">


            <div class="card shadow-lg border-0">


                <!-- Header -->
                <div class="card-header bg-dark text-white text-center py-3">

                    <h3 class="mb-1">
                        User Registration
                    </h3>

                    <p class="mb-0">
                        Welcome {{name}} 👋
                    </p>

                </div>



                <div class="card-body p-4">


                    <form method="POST">

                        {% csrf_token %}


                        <!-- Name -->
                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Name
                            </label>

                            <input type="text"
                                   name="name"
                                   class="form-control"
                                   value="{{name}}"
                                   readonly>

                        </div>



                        <!-- Age -->
                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Age
                            </label>

                            <input type="number"
                                   name="age"
                                   class="form-control"
                                   placeholder="Enter Age"
                                   required>

                        </div>




                        <!-- Email -->
                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Email
                            </label>

                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   placeholder="Enter Email"
                                   required>

                        </div>




                        <!-- Mobile -->
                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Mobile Number
                            </label>

                            <input type="text"
                                   name="mobile"
                                   class="form-control"
                                   placeholder="Enter Mobile Number"
                                   maxlength="10"
                                   required>

                        </div>




                        <!-- Address -->
                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Address
                            </label>

                            <textarea name="address"
                                      class="form-control"
                                      rows="3"
                                      placeholder="Enter Address"
                                      required></textarea>

                        </div>




                        <!-- Button -->
                        <button type="submit"
                                class="btn btn-dark w-100 btn-lg">

                            Create Account ✓

                        </button>


                    </form>


                </div>


            </div>


        </div>


    </div>


</div>



</body>
</html>
