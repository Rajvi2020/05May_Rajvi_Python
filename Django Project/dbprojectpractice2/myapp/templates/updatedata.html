<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Registration</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-100">

<div class="flex justify-center items-center min-h-screen">

    <div class="bg-white shadow-xl rounded-xl w-full max-w-4xl p-8">

        <h1 class="text-3xl font-bold text-center text-blue-700 mb-8">
            Employee Registration Form
        </h1>

        <form method="POST">

            {% csrf_token %}

            <div class="grid grid-cols-2 gap-5">

                <!-- First Name -->
                <div>
                    <label class="block font-semibold mb-1">First Name</label>
                    <input type="text" name="first_name" value="{{stid.first_name}}"
                    class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Last Name -->
                <div>
                    <label class="block font-semibold mb-1">Last Name</label>
                    <input type="text" name="last_name" value="{{stid.last_name}}"
                    class="w-full border border-gray-300 rounded-lg p-2">
                </div>

                <!-- Email -->
                <div>
                    <label class="block font-semibold mb-1">Email</label>
                    <input type="email" name="email" value="{{stid.email}}"
                    class="w-full border border-gray-300 rounded-lg p-2">
                </div>

                <!-- Mobile -->
                <div>
                    <label class="block font-semibold mb-1">Mobile Number</label>
                    <input type="text" name="mobile" value="{{stid.mobile}}"
                    class="w-full border border-gray-300 rounded-lg p-2">
                </div>

                <!-- Gender -->
                <div>
                    <label class="block font-semibold mb-1">Gender</label>
                    <select name="gender"
                    class="w-full border border-gray-300 rounded-lg p-2">
                        <option >Select Gender</option>
                        <option value="Male"
        {% if stid.gender == "Male" %}selected{% endif %}>Male</option>
                        <option value="Female"
        {% if stid.gender == "Female" %}selected{% endif %}>Female</option>
                        <option value="Other"
        {% if stid.gender == "Other" %}selected{% endif %}>Other</option>
                    </select>
                </div>

                <!-- DOB -->
                <div>
                    <label class="block font-semibold mb-1">Date Of Birth</label>
                    <input type="date" name="dob" value="{{stid.dob | date:'Y-m-d'}}"
                    class="w-full border border-gray-300 rounded-lg p-2">
                </div>

                <!-- Department -->
                <div>
                    <label class="block font-semibold mb-1">Department</label>
                    <input type="text" name="department" value="{{stid.department}}"
                    class="w-full border border-gray-300 rounded-lg p-2">
                </div>

                <!-- Designation -->
                <div>
                    <label class="block font-semibold mb-1">Designation</label>
                    <input type="text" name="designation" value="{{stid.designation}}"
                    class="w-full border border-gray-300 rounded-lg p-2">
                </div>

                <!-- Salary -->
                <div>
                    <label class="block font-semibold mb-1">Salary</label>
                    <input type="number" name="salary" value="{{stid.salary}}"
                    class="w-full border border-gray-300 rounded-lg p-2">
                </div>

                <!-- Joining Date -->
                <div>
                    <label class="block font-semibold mb-1">Joining Date</label>
                    <input type="date" name="joining_date" value="{{stid.joining_date | date:'Y-m-d'}}"
                    class="w-full border border-gray-300 rounded-lg p-2">
                </div>

                <!-- City -->
                <div>
                    <label class="block font-semibold mb-1">City</label>
                    <input type="text" name="city" value="{{stid.city}}"
                    class="w-full border border-gray-300 rounded-lg p-2">
                </div>

                <!-- Address -->
                <div>
                    <label class="block font-semibold mb-1">Address</label>
                    <textarea name="address" rows="2"
                    class="w-full border border-gray-300 rounded-lg p-2">{{stid.address}}</textarea>
                </div>

            </div>

            <!-- Buttons -->
            <div class="mt-8 flex justify-center gap-5">

                <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2 rounded-lg">
                    Register
                </button>

                <a href="/showdata/"
                class="bg-green-600 hover:bg-green-700 text-white px-8 py-2 rounded-lg">
                    Show Employees
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
