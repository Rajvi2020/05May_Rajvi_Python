<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Product</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>


<body class="bg-gray-100">


<div class="min-h-screen flex items-center justify-center py-10">


<div class="bg-white shadow-lg rounded-xl w-full max-w-xl p-8">


<h2 class="text-3xl font-bold text-center text-blue-600 mb-6">

Add Product

</h2>



<form method="POST">

{% csrf_token %}


<div class="space-y-5">



<div>

<label class="block mb-2 font-medium">
Product Name
</label>


<input type="text"
name="name"
placeholder="Enter Product Name"
class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">

</div>



<div>

<label class="block mb-2 font-medium">
Price
</label>


<input type="number"
name="price"
placeholder="Enter Price"
class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">

</div>



<div>

<label class="block mb-2 font-medium">
Category
</label>


<input type="text"
name="category"
placeholder="Enter Category"
class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">

</div>


</div>



<div class="mt-6 text-center">

<button
type="submit"
class="bg-blue-600 text-white px-8 py-2 rounded-lg hover:bg-blue-700">

Save Product

</button>


</div>



</form>


</div>


</div>


<a href="/showdata/"
class="bg-blue-600 text-white px-4 py-2 rounded ml-10">

Show Data

</a>


</body>

</html>
