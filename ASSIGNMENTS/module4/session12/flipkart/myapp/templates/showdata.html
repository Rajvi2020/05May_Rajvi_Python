<!DOCTYPE html>
<html>

<head>

<title>Product Data</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>


<body class="bg-gray-100">


<div class="container mx-auto mt-10">


<h1 class="text-3xl font-bold text-center text-blue-600 mb-8">

Product Records

</h1>



<div class="overflow-x-auto">


<table class="w-full border bg-white shadow-lg rounded-lg">


<thead class="bg-blue-600 text-white">


<tr>

<th class="border p-3">ID</th>

<th class="border p-3">Name</th>

<th class="border p-3">Price</th>

<th class="border p-3">Category</th>

<th class="border p-3">Action</th>


</tr>


</thead>



<tbody>


{% for i in data %}


<tr class="text-center hover:bg-gray-100">


<td class="border p-2">
{{i.id}}
</td>


<td class="border p-2">
{{i.name}}
</td>


<td class="border p-2">
{{i.price}}
</td>


<td class="border p-2">
{{i.category}}
</td>



<td class="border p-2">


<a href="/updatedata/{{i.id}}"
class="text-blue-600 underline">

Update

</a>


<a href="/deletedata/{{i.id}}"
class="text-red-600 underline ml-3">

Delete

</a>



</td>


</tr>


{% empty %}


<tr>

<td colspan="5" class="text-center p-5 text-red-600">

No Data Found

</td>

</tr>


{% endfor %}



</tbody>


</table>


</div>


</div>


</body>

</html>
