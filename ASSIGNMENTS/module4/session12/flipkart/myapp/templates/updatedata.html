<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Update Product</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>


<body class="bg-gray-100">


<div class="min-h-screen flex items-center justify-center py-10">


    <div class="bg-white shadow-lg rounded-xl w-full max-w-xl p-8">


        <h2 class="text-3xl font-bold text-center text-blue-600 mb-6">
            Update Product
        </h2>



        <form method="POST">

            {% csrf_token %}



            <!-- Product Name -->
            <div class="mb-5">

                <label class="block mb-2 font-medium">
                    Product Name
                </label>


                <input 
                type="text"
                name="name"
                value="{{pid.name}}"
                placeholder="Enter Product Name"
                class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">

            </div>



            <!-- Price -->
            <div class="mb-5">

                <label class="block mb-2 font-medium">
                    Price
                </label>


                <input 
                type="number"
                name="price"
                value="{{pid.price}}"
                placeholder="Enter Price"
                class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">

            </div>



            <!-- Category -->
            <div class="mb-5">

                <label class="block mb-2 font-medium">
                    Category
                </label>


                <input 
                type="text"
                name="category"
                value="{{pid.category}}"
                placeholder="Enter Category"
                class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">

            </div>



            <!-- Button -->
            <div class="text-center">


                <button 
                type="submit"
                class="bg-blue-600 text-white px-8 py-2 rounded-lg hover:bg-blue-700 transition">

                    Update Product

                </button>


            </div>



        </form>


    </div>


</div>



</body>

</html>
