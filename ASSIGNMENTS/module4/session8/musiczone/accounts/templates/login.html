{% extends 'base.html' %}



{% block content %}


<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow">


<h2 class="text-3xl font-bold mb-5">

Login

</h2>



<form method="POST">

{% csrf_token %}



<input 
name="username"
placeholder="Username"
class="border w-full p-2 mb-3">



<input
type="password"
name="password"
placeholder="Password"
class="border w-full p-2 mb-3">



<button
class="bg-blue-600 text-white w-full p-2 rounded">

Login

</button>



</form>


</div>


{% endblock %}
