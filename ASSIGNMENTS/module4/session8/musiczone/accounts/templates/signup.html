{% extends 'base.html' %}


{% block title %}
Signup
{% endblock %}



{% block content %}


<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow">


<h2 class="text-3xl font-bold mb-5 text-center">

Join MusicZone

</h2>



<form method="POST">

{% csrf_token %}


<label>
Username
</label>

{{form.username}}



<label>
Email
</label>

{{form.email}}



<label>
Password
</label>

{{form.password}}




<button
class="bg-green-600 text-white w-full py-2 rounded mt-5">

Signup

</button>


</form>


</div>


{% endblock %}
